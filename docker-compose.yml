version: "3.9"

services:

  mysql:
    image: mysql:8.0
    container_name: workforcepro-mysql

    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: workforce_pro

    ports:
      - "3306:3306"

    volumes:
      - mysql-data:/var/lib/mysql

  workforcepro:
    build: .

    container_name: workforcepro-app

    ports:
      - "8080:8080"

    depends_on:
      - mysql

volumes:
  mysql-data: